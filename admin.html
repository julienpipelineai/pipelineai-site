<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>PipelineAI — Admin</title>
<style>
  :root{
    --bg:#0e0e0e; --bg-2:#1a1a1a; --card:#161616; --border:rgba(255,255,255,0.08);
    --text:#f5f2ec; --text-2:#b8b4ac; --text-3:#7a7a7a; --accent:#4f7cff; --accent-dim:rgba(79,124,255,0.12);
    --green:#3ddc84; --warm:#f5a623; --red:#ff5a5a;
    --sans:'Segoe UI',system-ui,Arial,sans-serif; --mono:'SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
  a{color:var(--accent);text-decoration:none;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);}
  .logo{font-weight:800;font-size:1.05rem;}
  .logo span{color:var(--accent);}
  .btn{background:var(--bg-2);border:1px solid var(--border);color:var(--text);padding:0.5rem 1rem;border-radius:8px;cursor:pointer;font-size:0.85rem;}
  .btn:hover{border-color:var(--accent);}
  .btn-accent{background:var(--accent);border:none;color:#fff;}
  .wrap{max-width:1100px;margin:0 auto;padding:1.5rem;}

  /* Login */
  #login{display:flex;align-items:center;justify-content:center;min-height:70vh;}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;text-align:center;}
  .login-card h1{font-size:1.3rem;margin-bottom:0.5rem;}
  .login-card p{color:var(--text-3);font-size:0.85rem;margin-bottom:1.5rem;}
  .login-card input{width:100%;padding:0.75rem 1rem;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;margin-bottom:1rem;font-family:var(--mono);}
  .login-card input:focus{outline:none;border-color:var(--accent);}
  .err{color:var(--red);font-size:0.82rem;margin-top:0.75rem;min-height:1.2em;}

  /* Dashboard */
  #dash{display:none;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;}
  .kpi-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:0.5rem;}
  .kpi-val{font-size:1.8rem;font-weight:800;}
  .kpi-sub{font-size:0.78rem;color:var(--text-3);margin-top:0.25rem;}
  .section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin-bottom:1.5rem;}
  .section h2{font-size:0.95rem;margin-bottom:1rem;}
  table{width:100%;border-collapse:collapse;font-size:0.85rem;}
  th{text-align:left;color:var(--text-3);font-weight:600;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;padding:0.5rem 0.75rem;border-bottom:1px solid var(--border);}
  td{padding:0.6rem 0.75rem;border-bottom:1px solid var(--border);color:var(--text-2);}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block;background:var(--accent-dim);color:var(--accent);padding:0.15rem 0.55rem;border-radius:100px;font-size:0.72rem;font-weight:600;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
  @media(max-width:700px){.grid-2{grid-template-columns:1fr;}}
  .muted{color:var(--text-3);font-size:0.82rem;text-align:center;padding:1rem;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Pipeline<span>AI</span> · Admin</div>
  <button class="btn" id="logout-btn" onclick="logout()" style="display:none;">Déconnexion</button>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h1>🔒 Accès admin</h1>
    <p>Entrez votre token administrateur (ADMIN_TOKEN).</p>
    <input id="token-input" type="password" placeholder="ADMIN_TOKEN" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-accent" style="width:100%;padding:0.75rem;" onclick="login()">Accéder →</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="wrap">
    <div class="kpis" id="kpis"></div>
    <div class="grid-2">
      <div class="section">
        <h2>Top secteurs</h2>
        <div id="top-sectors"></div>
      </div>
      <div class="section">
        <h2>Top signaux</h2>
        <div id="top-signals"></div>
      </div>
    </div>
    <div class="section">
      <h2>Derniers clients</h2>
      <div id="recent-clients"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://pipelineai-backend-production.up.railway.app';
const TOKEN_KEY = 'pai_admin_token';

function getToken(){ return localStorage.getItem(TOKEN_KEY) || ''; }

function fmtDate(iso){
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }catch{ return iso; }
}

async function fetchStats(token){
  const res = await fetch(API_BASE + '/admin/stats', { headers: { 'X-Admin-Token': token } });
  if(res.status === 403) throw new Error('forbidden');
  if(!res.ok) throw new Error('Erreur ' + res.status);
  return res.json();
}

function render(d){
  document.getElementById('kpis').innerHTML = [
    ['Clients', d.total_clients, '+' + d.new_this_month + ' ce mois'],
    ['Prospects', d.total_prospects, ''],
    ['Taux de contact', d.avg_contact_rate, 'moyen'],
    ['Taux de conversion', d.avg_conversion_rate, 'moyen'],
    ['Plan le + vendu', d.top_plan, ''],
  ].map(([l,v,s]) => `<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val">${v ?? '—'}</div>${s?`<div class="kpi-sub">${s}</div>`:''}</div>`).join('');

  const sectors = d.top_sectors || [];
  document.getElementById('top-sectors').innerHTML = sectors.length
    ? `<table><thead><tr><th>Secteur</th><th>Prospects</th><th>Contact</th></tr></thead><tbody>${
        sectors.map(s=>`<tr><td>${s.sector}</td><td>${s.count}</td><td><span class="tag">${s.contact_rate}</span></td></tr>`).join('')}</tbody></table>`
    : '<div class="muted">Aucune donnée</div>';

  const signals = d.top_signals || [];
  document.getElementById('top-signals').innerHTML = signals.length
    ? `<table><thead><tr><th>Signal</th><th>Nb</th></tr></thead><tbody>${
        signals.map(s=>`<tr><td>${s.signal}</td><td>${s.count}</td></tr>`).join('')}</tbody></table>`
    : '<div class="muted">Aucune donnée</div>';

  const clients = d.recent_clients || [];
  document.getElementById('recent-clients').innerHTML = clients.length
    ? `<table><thead><tr><th>Email</th><th>Plan</th><th>Inscrit le</th></tr></thead><tbody>${
        clients.map(c=>`<tr><td>${c.email}</td><td><span class="tag">${c.plan}</span></td><td>${fmtDate(c.created_at)}</td></tr>`).join('')}</tbody></table>`
    : '<div class="muted">Aucun client</div>';
}

function showDash(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'inline-block';
}
function showLogin(msg){
  document.getElementById('login').style.display = 'flex';
  document.getElementById('dash').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
  if(msg) document.getElementById('login-err').textContent = msg;
}

async function login(){
  const token = document.getElementById('token-input').value.trim();
  if(!token){ document.getElementById('login-err').textContent = 'Token requis.'; return; }
  document.getElementById('login-err').textContent = 'Vérification…';
  try{
    const d = await fetchStats(token);
    localStorage.setItem(TOKEN_KEY, token);
    showDash(); render(d);
  }catch(e){
    document.getElementById('login-err').textContent = (e.message==='forbidden') ? 'Token invalide.' : 'Erreur de connexion au serveur.';
  }
}

function logout(){ localStorage.removeItem(TOKEN_KEY); document.getElementById('token-input').value=''; showLogin(); }

// Auto-login si token déjà mémorisé
(async function(){
  const t = getToken();
  if(!t){ showLogin(); return; }
  try{ const d = await fetchStats(t); showDash(); render(d); }
  catch(e){ showLogin(e.message==='forbidden' ? 'Session expirée, reconnectez-vous.' : ''); }
})();
</script>
</body>
</html>
