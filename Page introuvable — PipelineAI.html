<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — PipelineAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0e0e; color: #f5f2ec;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em; margin-bottom: 3rem; }
  .logo span { color: #1a4fff; }
  .code { font-family: 'Syne', sans-serif; font-size: 6rem; font-weight: 800; letter-spacing: -0.04em; color: #1a4fff; line-height: 1; margin-bottom: 1rem; }
  h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
  p { color: rgba(245,242,236,0.5); font-size: 0.95rem; max-width: 400px; line-height: 1.65; margin-bottom: 2.5rem; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #1a4fff; color: #fff;
    border: none; border-radius: 100px;
    padding: 0.875rem 2rem; font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; text-decoration: none; transition: all 0.15s;
  }
  .btn:hover { background: #3d6ae0; transform: translateY(-2px); }
  .btn-secondary {
    display: inline-flex; align-items: center;
    color: rgba(245,242,236,0.4); font-size: 0.85rem;
    text-decoration: none; margin-top: 1rem;
    transition: color 0.15s;
  }
  .btn-secondary:hover { color: rgba(245,242,236,0.7); }
</style>
</head>
<body>
  <div class="logo">Pipeline<span>AI</span></div>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Revenez à l'accueil pour découvrir PipelineAI.</p>
  <a class="btn" href="/">← Retour à l'accueil</a><br>
  <a class="btn-secondary" href="mailto:julien@pipelineai.fr">Besoin d'aide ? julien@pipelineai.fr</a>
</body>
</html>
